name: 🎮 Run Mario Game

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-game:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 🎮 Run Mario Game Test
      env:
        SDL_VIDEODRIVER: dummy
      run: python main.py --headless
    
    - name: ✅ Game Test Completed
      run: echo "Mario Game ran successfully on GitHub!"
